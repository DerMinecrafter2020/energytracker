version: '3.8'

services:
  # ── Watchtower: polls Docker Hub every hour, auto-pulls + restarts koffein-tracker ──
  watchtower:
    image: containrrr/watchtower
    container_name: koffein-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Check every hour (3600 s). Only watch the koffein-tracker container.
    command: --interval 3600 koffein-tracker
    restart: unless-stopped

  # ── Redis: persistent storage, survives app container updates ──
  redis:
    image: redis:7-alpine
    container_name: koffein-redis
    volumes:
      - redis-data:/data
    # Save every 60 s if at least 1 key changed
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    networks:
      - koffein-network

  app:
    image: derminecrafter2020/koffein-tracker:latest
    container_name: koffein-tracker
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - PORT=3001
    volumes:
      - /root/energytracker/.env.local:/app/.env.local:ro
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - koffein-network

networks:
  koffein-network:
    driver: bridge

volumes:
  redis-data:
