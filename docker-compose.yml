services:
  # ── Redis: persistent storage, survives app container updates ──
  redis:
    image: redis:7-alpine
    container_name: koffein-redis
    volumes:
      - redis-data:/data
    # Save every 60 s if at least 1 key changed
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    networks:
      - koffein-network

  app:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
        VITE_ADMIN_SECRET: ${VITE_ADMIN_SECRET:-et-admin-2024}
        VITE_ADMIN_EMAIL: ${VITE_ADMIN_EMAIL:-admin@energytracker.de}
        VITE_ADMIN_PASSWORD: ${VITE_ADMIN_PASSWORD:-Admin@2024!}
        VITE_USER_EMAIL: ${VITE_USER_EMAIL:-user@energytracker.de}
        VITE_USER_PASSWORD: ${VITE_USER_PASSWORD:-User@2024!}
    image: derminecrafter2020/koffein-tracker:latest
    container_name: koffein-tracker
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_TYPE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - PORT=3001
    volumes:
      - ./.env.local:/app/.env.local:ro
    depends_on:
      - redis
      - mailpit
    restart: unless-stopped
    networks:
      - koffein-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: koffein-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - koffein-network

networks:
  koffein-network:
    driver: bridge

volumes:
  redis-data:
